<div style="font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 16px; overflow: hidden; border: 1px solid #e5e7eb;">

  <!-- Header -->
  <div style="background: linear-gradient(135deg, #2563eb, #1e40af); padding: 32px 32px 28px; text-align: center;">
    <h1 style="font-family: Fraunces, Georgia, serif; color: #ffffff; font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.02em;">Sparkurity</h1>
  </div>

  <!-- Body -->
  <div style="padding: 32px;">
    <h2 style="font-family: Fraunces, Georgia, serif; color: #1f2937; font-size: 22px; font-weight: 600; margin: 0 0 16px; letter-spacing: -0.01em;">Welcome to {{course_title}}</h2>

    <p style="color: #1f2937; font-size: 16px; line-height: 1.7; margin: 0 0 16px;">Hi!</p>

    <p style="color: #1f2937; font-size: 16px; line-height: 1.7; margin: 0 0 24px;">You have been granted access to the course <strong>{{course_title}}</strong>. Sign in with your email to get started.</p>

    <!-- CTA Button -->
    <div style="text-align: center; margin: 28px 0;">
      <a href="{{course_url}}" style="background: #2563eb; color: #ffffff; padding: 14px 32px; text-decoration: none; border-radius: 8px; display: inline-block; font-weight: 600; font-size: 16px;">Access Course</a>
    </div>

    <!-- Email reminder -->
    <div style="background: #f3f4f6; border-radius: 8px; padding: 16px; margin: 24px 0 0;">
      <p style="color: #6b7280; font-size: 14px; line-height: 1.6; margin: 0;">
        Sign in using: <strong style="color: #1f2937;">{{recipient_email}}</strong>
      </p>
    </div>
  </div>

  <!-- Footer -->
  <div style="border-top: 1px solid #e5e7eb; padding: 20px 32px; text-align: center;">
    <p style="color: #6b7280; font-size: 13px; margin: 0;">Juris Puce &middot; <a href="https://jurispuce.com" style="color: #2563eb; text-decoration: none;">Sparkurity</a></p>
  </div>

</div>
